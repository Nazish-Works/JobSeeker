name: JobSeeker — Auto Scan

on:
  schedule:
    # 5 scans/day — times in UTC (IST = UTC+5:30)
    # 03:00 UTC = 08:30 IST  → morning scan
    # 07:00 UTC = 12:30 IST  → lunch scan
    # 11:00 UTC = 16:30 IST  → afternoon scan
    # 15:00 UTC = 20:30 IST  → evening scan
    # 19:00 UTC = 00:30 IST  → late-night scan
    - cron: "0 3 * * *"
    - cron: "0 7 * * *"
    - cron: "0 11 * * *"
    - cron: "0 15 * * *"
    - cron: "0 19 * * *"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore the seen_jobs.json and token.json from previous runs
      # so we don't re-process already-seen jobs or re-authenticate
      - name: Restore cached data
        uses: actions/cache@v4
        with:
          path: |
            data/seen_jobs.json
            data/applications.json
            token.json
          key: jobseeker-state-${{ runner.os }}
          restore-keys: jobseeker-state-

      - name: Write Google credentials from secret
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Run JobSeeker scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      # Save updated state so next run picks up where this one left off
      - name: Save state cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            data/seen_jobs.json
            data/applications.json
            token.json
          key: jobseeker-state-${{ runner.os }}-${{ github.run_id }}

      - name: Upload logs as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jobseeker-log-${{ github.run_id }}
          path: data/jobseeker.log
          retention-days: 7
